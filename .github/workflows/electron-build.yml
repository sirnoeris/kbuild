name: Build Desktop Installers

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build client + server bundle
        run: npm run build

      - name: Type check
        run: npm run check

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: kbuild-windows-installer
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.blockmap
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build client + server bundle
        run: npm run build

      - name: Type check
        run: npm run check

      - name: Build macOS installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build:mac

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: kbuild-macos-installer
          path: |
            release/*.dmg
            release/*.yml
            release/*.blockmap

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.blockmap
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
